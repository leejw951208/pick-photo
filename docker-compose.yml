services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pick_photo
      POSTGRES_USER: pick_photo
      POSTGRES_PASSWORD: pick_photo_dev
    ports:
      - "${PICK_PHOTO_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pick_photo -d pick_photo"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai:
    build:
      context: ./apps/ai
    environment:
      PICK_PHOTO_AI_STORAGE_DIR: /data/storage
    ports:
      - "${PICK_PHOTO_AI_PORT:-8000}:8000"
    volumes:
      - pick-photo-storage:/data/storage
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3).close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
    environment:
      PORT: "3000"
      PHOTO_STORAGE_DIR: /data/storage
      AI_SERVICE_BASE_URL: http://ai:8000
      DATABASE_URL: postgres://pick_photo:pick_photo_dev@postgres:5432/pick_photo
    ports:
      - "${PICK_PHOTO_BACKEND_PORT:-3000}:3000"
    depends_on:
      ai:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - pick-photo-storage:/data/storage
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/docs-json').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  pick-photo-storage:
